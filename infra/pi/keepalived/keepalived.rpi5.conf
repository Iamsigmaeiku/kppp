# RPi5 (kpp) — keepalived MASTER
# Install: sudo cp infra/pi/keepalived/keepalived.rpi5.conf /etc/keepalived/keepalived.conf
# Init:    echo 0 > /opt/smartkart/priority_override
#          sudo systemctl enable --now keepalived
# priority_override 由部署帳號可寫（無需 sudo）

global_defs {
    router_id KPP_RPI5
    script_user root
    enable_script_security
}

track_file deploy_override {
    file /opt/smartkart/priority_override
    weight -100
}

vrrp_script chk_api {
    script "/opt/smartkart/health_check.sh"
    interval 2
    weight 20
    fall 2
    rise 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 150
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass kppvrrp5
    }
    virtual_ipaddress {
        192.168.88.100/24
    }
    track_script {
        chk_api
    }
    track_file {
        deploy_override
    }
}
