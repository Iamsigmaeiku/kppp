# RPi4 (chuck) — keepalived BACKUP
# Install: sudo cp infra/pi/keepalived/keepalived.rpi4.conf /etc/keepalived/keepalived.conf
# Init:    echo 0 > /opt/smartkart/priority_override
#          sudo systemctl enable --now keepalived
# priority_override 由部署帳號可寫（無需 sudo）
#
# WARNING: 只有在與 RPi5 同 L2（同 192.168.88.0/24）時才 enable keepalived。
# 目前 chuck 在 192.168.0.0/24 時請保持 disable，否則會 split-brain 搶 VIP。

global_defs {
    router_id KPP_RPI4
    script_user root
    enable_script_security
}

track_file deploy_override {
    file /opt/smartkart/priority_override
    weight -100
}

vrrp_script chk_api {
    script "/opt/smartkart/health_check.sh"
    interval 2
    weight 20
    fall 2
    rise 2
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass kppvrrp5
    }
    virtual_ipaddress {
        192.168.88.100/24
    }
    track_script {
        chk_api
    }
    track_file {
        deploy_override
    }
}
