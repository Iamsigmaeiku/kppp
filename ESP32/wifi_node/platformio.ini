; Board #2 — wifi node (UART RX → WiFiUDP)
; No sensors. UART2 RX=16 TX=17 @ 921600 from sensor_node.
; pio run -t upload
; copy include/secrets.h.example → include/secrets.h
; OTA: pio run -e wifi_node_ota -t upload

[env:wifi_node]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -I../common
    -Iinclude
board_build.partitions = default.csv
lib_deps =

[env:wifi_node_ota]
extends = env:wifi_node
upload_protocol = espota
upload_port = kpp-wifi.local
upload_flags =
    --auth=kpp-ota
