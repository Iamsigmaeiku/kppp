; Board #1 — sensor node (ICM42688 + M10 + 15-state ESKF)
; NO WiFi libraries. UART2 → wifi_node @ 921600.
; pio run -t upload

[env:sensor_node]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DESKF_DEBUG=1
    -I../common
board_build.partitions = default.csv
lib_deps =
