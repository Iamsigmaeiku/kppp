; Board #1 — sensor node (ICM42688 + MPU + M10 + ESKF + WiFi upload)
; pio run -t upload
; copy include/secrets.h.example → include/secrets.h
; OTA: pio run -e sensor_node_ota -t upload

[env:sensor_node]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DESKF_DEBUG=1
    -I../common
    -Iinclude
board_build.partitions = default.csv
lib_deps =

[env:sensor_node_ota]
extends = env:sensor_node
upload_protocol = espota
upload_port = kpp-sensor.local
upload_flags =
    --auth=kpp-ota
