; ESP32-WROOM-32 profiles → HTTP ingest
;   esp32dev       — ICM-42688 + DHT11 + NEO-6M (第一顆)
;   esp32-gps-hall — 霍爾(GPIO36) + NEO-6M (第二顆, DEVICE_ID=esp32-kart-02)
; GPS: TXD→GPIO16, RXD→GPIO17（不要接 GPIO1/3 USB 腳）
; pio run -e esp32-gps-hall -t upload

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^7.2.1
    mikalhart/TinyGPSPlus @ ^1.1.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
board_build.partitions = default.csv

[env:esp32-gps-hall]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.1
    mikalhart/TinyGPSPlus @ ^1.1.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DPROFILE_GPS_HALL
    '-DDEVICE_ID="esp32-kart-02"'
board_build.partitions = default.csv
