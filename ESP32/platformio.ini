; ESP32-WROOM-32 profiles → HTTP ingest
;   esp32dev       — ICM-42688 (VSPI) + DHT11 + M10-180C + 2D ESKF → dr_position
;   esp32-imu2-gps — GY-85 + MPU6050@0x69 + NEO-6M (第二顆, DEVICE_ID=esp32-kart-02)
;   esp32-dual-gps — M10(UART0) + NEO(UART2) + ICM I2C → ingest（寫 gps_track）
; GPS 單顆 (esp32dev / imu2): TXD→GPIO16, RXD→GPIO17（UART1；不要接 GPIO1/3）
;   勿跟 esp32-dual-gps 的 UART0（GPIO1/3）搞混
; ICM SPI (esp32dev): SCK=18, MISO=19, MOSI=23, CS=5
; 雙 GPS: 燒錄前務必拔掉 UART0 上的 M10 TX/RX
; pio run -e esp32dev -t upload
; pio run -e esp32-imu2-gps -t upload
; pio run -e esp32-dual-gps -t upload

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^7.2.1
    mikalhart/TinyGPSPlus @ ^1.1.0
build_src_filter = +<*> -<main_dual_gps.cpp> -<main_imu2.cpp> -<DeadReckoner.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DESKF_DEBUG=1
    -DDR_IMU_MOUNT_YAW_DEG=0
board_build.partitions = default.csv

[env:esp32-imu2-gps]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.1
    mikalhart/TinyGPSPlus @ ^1.1.0
build_src_filter = -<*> +<main_imu2.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    '-DDEVICE_ID="esp32-kart-02"'
board_build.partitions = default.csv

[env:esp32-dual-gps]
platform = espressif32
board = esp32dev
framework = arduino
; UART0 被 M10 佔用，無 Serial Monitor
monitor_speed = 9600
upload_speed = 921600
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.1
    mikalhart/TinyGPSPlus @ ^1.1.0
build_src_filter = -<*> +<main_dual_gps.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DPROFILE_DUAL_GPS
    '-DDEVICE_ID="esp32-kart-dual"'
board_build.partitions = default.csv
