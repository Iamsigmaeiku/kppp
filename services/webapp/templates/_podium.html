{% macro podium(entries) %}
{% if entries %}
<div class="podium">
  {% for entry in entries[:3] %}
  <div class="podium-slot place-{{ loop.index }}">
    {% if entry.avatar_url %}
    <img class="podium-avatar" src="{{ entry.avatar_url }}" alt="" />
    {% else %}
    <span class="podium-avatar avatar-fallback">{{ (entry.name or "?").strip()[0] | upper }}</span>
    {% endif %}
    <div class="podium-name">{{ entry.name }}</div>
    <div class="podium-time">{{ entry.time_label }}</div>
    <div class="podium-block">{{ loop.index }}</div>
  </div>
  {% endfor %}
</div>
{% endif %}
{% endmacro %}
