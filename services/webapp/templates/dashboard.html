{% extends "base.html" %}

{% block title %}即時面板 · TKS Dashboard{% endblock %}
{% block heading %}即時面板{% endblock %}

{% block content %}
<div class="dash-toolbar">
  <div id="sessionBadge" class="session-badge" title="">
    <span class="session-label">本節載入中…</span>
  </div>
  <button id="archiveBtn" class="btn btn-primary archive-btn" type="button" style="display:none;" disabled>
    歸檔本節
  </button>
  <div id="status"><span class="dot"></span><span class="label">連線中…</span></div>
</div>

<div id="archiveBanner" class="archive-banner" style="display:none;" role="status">
  <div class="archive-banner-body">
    <strong id="archiveBannerTitle">本節已歸檔</strong>
    <span id="archiveBannerDetail"></span>
  </div>
  <div class="archive-banner-actions">
    <a id="archiveSessionLink" class="btn btn-primary" href="/sessions">看場次</a>
    <a class="btn" href="/profile">產生 AI 教練報告 →</a>
    <button type="button" class="btn" id="archiveBannerDismiss">關閉</button>
  </div>
</div>

<div class="panel">
  <div class="table-wrap">
    <table class="dash-table">
      <thead>
        <tr>
          <th>排名</th>
          <th>車號</th>
          <th>UID</th>
          <th>圈數</th>
          <th>上圈</th>
          <th>最佳</th>
          <th>本圈</th>
          <th>原始資料</th>
          <th>每圈</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
  const rows = document.getElementById("rows");
  const statusEl = document.getElementById("status");
  const statusLabel = statusEl.querySelector(".label");
  const sessionBadge = document.getElementById("sessionBadge");
  const sessionLabelEl = sessionBadge.querySelector(".session-label");
  const archiveBtn = document.getElementById("archiveBtn");
  const archiveBanner = document.getElementById("archiveBanner");
  const archiveBannerTitle = document.getElementById("archiveBannerTitle");
  const archiveBannerDetail = document.getElementById("archiveBannerDetail");
  const archiveSessionLink = document.getElementById("archiveSessionLink");
  const state = new Map();
  let decoderStatus = { connected: false, connected_count: 0, total_count: 0, decoders: {} };
  // 目前的 session_id：由伺服器在連線時、以及每次開新場次時廣播
  // （見 dashboard.py 的 session_info 訊息），用來查詢「每一圈的圈時」
  // 展開明細（GET /api/sessions/{session_id}/laps/{transponder_id}）。
  let currentSessionId = null;
  let currentSessionNumber = null;
  let currentSessionDate = null;
  let archiveBusy = false;

  function sessionDisplayLabel() {
    if (currentSessionNumber != null) {
      const dateBit = currentSessionDate ? `（${currentSessionDate}）` : "";
      return `第 ${currentSessionNumber} 節${dateBit}`;
    }
    return currentSessionId || "本節載入中…";
  }

  function updateSessionBadge() {
    sessionLabelEl.textContent = sessionDisplayLabel();
    sessionBadge.title = currentSessionId || "";
    sessionBadge.classList.toggle("numbered", currentSessionNumber != null);
  }

  function anyTimerPausedWithLaps() {
    let hasLaps = false;
    let allPaused = true;
    let any = false;
    for (const s of state.values()) {
      if ((s.lap_count || 0) <= 0 && !(s.best_lap_time > 0)) continue;
      any = true;
      hasLaps = true;
      if (s.timer_active !== false) allPaused = false;
    }
    return { hasLaps, allPaused: any && allPaused };
  }

  function updateArchiveButton() {
    const { hasLaps, allPaused } = anyTimerPausedWithLaps();
    archiveBtn.style.display = hasLaps ? "" : "none";
    archiveBtn.disabled = archiveBusy || !hasLaps;
    if (!hasLaps) {
      archiveBtn.textContent = "歸檔本節";
      return;
    }
    if (archiveBusy) {
      archiveBtn.textContent = "歸檔中…";
      return;
    }
    archiveBtn.textContent = allPaused ? "本節已暫停 · 歸檔" : "歸檔本節（結束）";
    archiveBtn.classList.toggle("ready", allPaused);
  }

  async function refreshSessionMeta() {
    try {
      const r = await fetch("/api/session/current");
      if (!r.ok) return;
      const d = await r.json();
      if (d.session_id) currentSessionId = d.session_id;
      currentSessionNumber = d.session_number ?? null;
      currentSessionDate = d.session_date ?? null;
      updateSessionBadge();
      updateArchiveButton();
    } catch (e) {}
  }

  archiveBtn.addEventListener("click", async () => {
    if (archiveBusy) return;
    const label = sessionDisplayLabel();
    if (!confirm(`確定歸檔「${label}」？\n歸檔後即時面板會清空，可到「我的資料」產生 AI 教練報告。`)) {
      return;
    }
    archiveBusy = true;
    updateArchiveButton();
    try {
      const r = await fetch("/api/session/archive", { method: "POST" });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        const detail = d.detail;
        throw new Error(
          typeof detail === "string" ? detail
            : (detail && detail.message) || ("歸檔失敗 (" + r.status + ")")
        );
      }
      const archived = d.archived || {};
      const nice = archived.label || archived.session_id || "本節";
      archiveBannerTitle.textContent = `${nice} 已歸檔`;
      archiveBannerDetail.textContent = archived.session_id
        ? `（${archived.session_id}）— 可產生 AI 教練報告`
        : "可到「我的資料」產生 AI 教練報告";
      archiveSessionLink.href = d.session_url || "/sessions";
      archiveBanner.style.display = "";
      currentSessionId = d.new_session_id || null;
      currentSessionNumber = null;
      currentSessionDate = null;
      updateSessionBadge();
      await refreshSessionMeta();
    } catch (e) {
      alert(e.message || String(e));
    } finally {
      archiveBusy = false;
      updateArchiveButton();
    }
  });

  document.getElementById("archiveBannerDismiss").addEventListener("click", () => {
    archiveBanner.style.display = "none";
  });

  function fmt(sec) {
    if (sec == null || Number.isNaN(sec)) return "—";
    return sec.toFixed(3) + "s";
  }

  // 排序直接信任伺服器算好的 rank 欄位（見 LapTracker._to_broadcast_dict），
  // 不在前端重算一份排序邏輯——避免兩份邏輯久了互相對不上。
  function compareStates(a, b) {
    return (a.rank ?? Infinity) - (b.rank ?? Infinity);
  }

  // rowKey：一律用 transponder_id（穩定、唯一，不受 car_number 是否含 "?" 前綴影響），
  // 避免同一台車在不同訊息路徑（單筆 vs 全量快照）之間因 key 計算不一致而被誤判成新 row 造成閃爍。
  function rowKey(data) {
    return data.transponder_id;
  }

  function updateStatus() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (decoderStatus.connected) {
      statusLabel.textContent = "已連線";
      statusEl.className = "ok";
    } else {
      statusLabel.textContent = "已連線 · 計時暫停";
      statusEl.className = "warn";
    }
  }

  function timerText(s) {
    if (s.current_lap_elapsed == null) return "—";
    if (!s.timer_active) return fmt(s.current_lap_elapsed);
    const recv = s._recvPerf ?? performance.now();
    const delta = (performance.now() - recv) / 1000;
    return fmt(s.current_lap_elapsed + Math.max(delta, 0));
  }

  function ensureRow(id) {
    let tr = document.getElementById("row-" + id);
    if (tr) return tr;
    tr = document.createElement("tr");
    tr.id = "row-" + id;
    tr.dataset.tid = id;
    tr.innerHTML = `
      <td class="rank"><span class="rank-badge"></span></td>
      <td class="car"></td>
      <td class="tid"></td>
      <td class="laps"></td>
      <td class="last"></td>
      <td class="best"></td>
      <td class="timer"><span class="timer-value"></span><span class="timer-badge"></span></td>
      <td class="raw"></td>
      <td class="expand"><button class="expand-btn" type="button" data-tid="${id}">展開</button></td>`;
    rows.appendChild(tr);

    const detail = document.createElement("tr");
    detail.id = "detail-" + id;
    detail.className = "detail-row";
    detail.style.display = "none";
    detail.innerHTML = `
      <td colspan="9">
        <div class="laps-detail">
          <span class="laps-loading" style="display:none;">載入中…</span>
          <span class="laps-empty" style="display:none;">還沒有已歸檔的圈速資料。</span>
          <div class="laps-chips"></div>
          <div class="laps-note" style="display:none;">最新 1-2 圈可能還在批次寫入中，請稍後按「重新整理」再試。</div>
          <button class="refresh-btn" type="button" data-tid="${id}">重新整理</button>
        </div>
      </td>`;
    rows.appendChild(detail);
    return tr;
  }

  function render() {
    const activeKeys = new Set(state.keys());
    for (const tr of [...rows.querySelectorAll("tr.detail-row, tr[id^='row-']")]) {
      const id = tr.dataset.tid;
      if (id && !activeKeys.has(id)) tr.remove();
    }

    const sorted = [...state.values()].sort(compareStates);

    sorted.forEach((s, idx) => {
      const id = rowKey(s);
      const tr = ensureRow(id);
      const rank = idx + 1;

      tr.querySelector(".rank-badge").textContent = rank;
      tr.querySelector(".car").textContent = s.car_number || s.transponder_id || "—";
      tr.querySelector(".tid").textContent = s.transponder_id || "—";
      tr.querySelector(".laps").textContent = s.lap_count ?? 0;
      tr.querySelector(".last").textContent = fmt(s.last_lap_time);
      tr.querySelector(".best").textContent = fmt(s.best_lap_time);

      const timerEl = tr.querySelector(".timer");
      timerEl.querySelector(".timer-value").textContent = timerText(s);
      timerEl.classList.toggle("paused", s.timer_active === false);

      tr.querySelector(".raw").textContent = s.raw_payload || "—";
      tr.classList.toggle("unregistered", s.registered === false);

      const isTopRank = s.best_lap_time != null && rank <= 3;
      tr.classList.toggle("rank-1", isTopRank && rank === 1);
      tr.classList.toggle("rank-2", isTopRank && rank === 2);
      tr.classList.toggle("rank-3", isTopRank && rank === 3);

      // 依排序後順序 append，將既有 row（連同它的展開明細 row）移到正確
      // 位置（DOM 中該順序即排行榜順序），維持兩者相鄰。
      rows.appendChild(tr);
      const detail = document.getElementById("detail-" + id);
      if (detail) rows.appendChild(detail);
    });

    updateArchiveButton();
  }

  // 每一圈的圈時展開明細：點「展開」時才 fetch 一次並快取，之後只有
  // 手動按「重新整理」才會重新查——避免展開明細被每秒一次的即時廣播
  // 反覆打 InfluxDB。
  const lapsCache = new Map(); // transponder_id -> laps[]

  async function loadLaps(tid, { force = false } = {}) {
    const detail = document.getElementById("detail-" + tid);
    if (!detail) return;
    const loadingEl = detail.querySelector(".laps-loading");
    const emptyEl = detail.querySelector(".laps-empty");
    const chipsEl = detail.querySelector(".laps-chips");
    const noteEl = detail.querySelector(".laps-note");

    if (!currentSessionId) {
      chipsEl.innerHTML = "";
      emptyEl.style.display = "";
      emptyEl.textContent = "尚未取得目前場次資訊，請稍候再試。";
      return;
    }

    if (!force && lapsCache.has(tid)) {
      renderLaps(tid, lapsCache.get(tid));
      return;
    }

    loadingEl.style.display = "";
    emptyEl.style.display = "none";
    noteEl.style.display = "none";
    chipsEl.innerHTML = "";

    try {
      const res = await fetch(`/api/sessions/${currentSessionId}/laps/${tid}`);
      if (!res.ok) throw new Error("查詢失敗");
      const data = await res.json();
      lapsCache.set(tid, data.laps || []);
      renderLaps(tid, data.laps || []);
    } catch {
      loadingEl.style.display = "none";
      emptyEl.style.display = "";
      emptyEl.textContent = "查詢失敗，請稍後再試。";
    }
  }

  function renderLaps(tid, laps) {
    const detail = document.getElementById("detail-" + tid);
    if (!detail) return;
    const loadingEl = detail.querySelector(".laps-loading");
    const emptyEl = detail.querySelector(".laps-empty");
    const chipsEl = detail.querySelector(".laps-chips");
    const noteEl = detail.querySelector(".laps-note");

    loadingEl.style.display = "none";

    if (!laps.length) {
      emptyEl.style.display = "";
      emptyEl.textContent = "還沒有已歸檔的圈速資料。";
      chipsEl.innerHTML = "";
      return;
    }

    emptyEl.style.display = "none";
    chipsEl.innerHTML = laps
      .map((lap) => `<span class="btn lap-chip"><b>#${lap.lap_number}</b> ${lap.lap_time_label}</span>`)
      .join("");

    // 已知的圈數比明細筆數多：代表最新一兩圈還在 InfluxDB 的批次寫入
    // 視窗內（見 influx_writer.py 的 flush_interval），提示使用者稍後
    // 重新整理，而不是讓人以為資料有誤。
    const s = state.get(tid);
    noteEl.style.display = s && s.lap_count > laps.length ? "" : "none";
  }

  rows.addEventListener("click", (ev) => {
    const expandBtn = ev.target.closest(".expand-btn");
    if (expandBtn) {
      const tid = expandBtn.dataset.tid;
      const detail = document.getElementById("detail-" + tid);
      if (!detail) return;
      const opening = detail.style.display === "none";
      detail.style.display = opening ? "" : "none";
      expandBtn.textContent = opening ? "收起" : "展開";
      if (opening) loadLaps(tid);
      return;
    }
    const refreshBtn = ev.target.closest(".refresh-btn");
    if (refreshBtn) {
      loadLaps(refreshBtn.dataset.tid, { force: true });
    }
  });

  // 每 50ms 只更新「本圈」數字，做本地內插讓碼表看起來即時跑動，
  // 不做整個 render()（避免不必要的 DOM 重排/reflow）。
  function tickTimers() {
    for (const [id, s] of state) {
      const tr = document.getElementById("row-" + id);
      if (!tr) continue;
      tr.querySelector(".timer-value").textContent = timerText(s);
    }
  }
  setInterval(tickTimers, 50);

  // ---- WebSocket：自動重連（指數退避 1s -> 2s -> 4s -> 上限 10s）----
  let ws = null;
  let reconnectAttempts = 0;
  let reconnectTimer = null;

  function scheduleReconnect() {
    if (reconnectTimer) return;
    const delay = Math.min(1000 * 2 ** reconnectAttempts, 10000);
    reconnectAttempts++;
    statusLabel.textContent = `連線中斷，${(delay / 1000).toFixed(0)}s 後重試…`;
    statusEl.className = "err";
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connectWebSocket();
    }, delay);
  }

  function connectWebSocket() {
    const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${wsProto}//${location.host}/ws/laps`);

    ws.onopen = () => {
      reconnectAttempts = 0;
      // 重連後 server 會重送 decoder_status + all_states() 全量快照，
      // 先清空舊的 state/DOM，避免殘留斷線前的過期資料。
      state.clear();
      rows.innerHTML = "";
      lapsCache.clear();
      currentSessionId = null;
      currentSessionNumber = null;
      currentSessionDate = null;
      updateSessionBadge();
      decoderStatus = { connected: false, connected_count: 0, total_count: 0, decoders: {} };
      statusLabel.textContent = "已連線";
      statusEl.className = "ok";
      updateStatus();
      refreshSessionMeta();
    };

    ws.onclose = () => {
      scheduleReconnect();
    };

    ws.onerror = () => {
      ws.close();
    };

    ws.onmessage = (ev) => {
      const data = JSON.parse(ev.data);
      if (data.type === "capture") {
        return;
      }
      if (data.type === "decoder_status") {
        decoderStatus = data;
        updateStatus();
        return;
      }
      if (data.type === "session_info") {
        currentSessionId = data.session_id;
        if (data.session_number != null) currentSessionNumber = data.session_number;
        if (data.session_date != null) currentSessionDate = data.session_date;
        updateSessionBadge();
        // WS 剛連上可能還沒有 number；補一次 REST
        if (currentSessionNumber == null) refreshSessionMeta();
        return;
      }
      if (data.type === "session_reset") {
        state.clear();
        rows.innerHTML = "";
        lapsCache.clear();
        currentSessionNumber = null;
        currentSessionDate = null;
        render();
        refreshSessionMeta();
        return;
      }
      data._recvPerf = performance.now();
      state.set(rowKey(data), data);
      render();
    };
  }

  connectWebSocket();
</script>
{% endblock %}
